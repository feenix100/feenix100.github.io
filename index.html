    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        /* Global Styling */
        body {
            font-family: 'Merriweather', serif;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }

        /* Header Styling */
        header {
            background: #CC9966;
            color: #fff;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        header h1 {
            font-size: 3rem;
            font-family: 'Roboto', sans-serif;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        header p {
            font-size: 1.2rem;
            margin-top: 0.5rem;
        }

        /* Navigation Styling */
        nav {
            text-align: center;
            margin: 1.5rem;
        }

        nav a {
            margin: 0 20px;
            text-decoration: none;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            font-size: 1.1rem;
        }

        nav a:hover {
            color: #007bff;
        }
        
        /* Main Content Styling */
        main {
            margin: 30px auto;
            max-width: 900px;
            padding: 2rem;
            background-color: #fff;
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h2 {
            font-size: 2rem;
            color: #2c3e50;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
        }

        h3 {
            font-size: 1.8rem;
            color: #2980b9;
            font-family: 'Roboto', sans-serif;
            font-weight: 500;
            margin-top: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            margin-bottom: 1.5rem;
        }

        /* Blog Post Links */
        .post-links {
            list-style: none;
            padding: 0;
        }

        .post-links li {
            margin: 15px 0;
        }

        .post-links a {
            font-size: 1.2rem;
            color: #007bff;
            text-decoration: none;
        }

        .post-links a:hover {
            text-decoration: underline;
        }

        /* Footer Styling */
    footer p {
        text-align: center;
        padding: 1rem;
        background-color: #34495e;
        color: rgb(231, 233, 120);
    }

    footer a {
